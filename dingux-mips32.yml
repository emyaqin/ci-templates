.libretro-dingux-mips32:
  image: $CI_SERVER_HOST:5050/libretro-infrastructure/libretro-build-dingux:latest
  stage: build-shared
  variables:
    MAKEFILE: Makefile
    MAKEFILE_PATH: .
    STRIP_CORE_LIB: 1
  before_script:
    - export NUMPROC=$(($(nproc)/5))
  artifacts:
    paths:
    - ${CORENAME}_libretro.so
    expire_in: 10 min
  dependencies: []

.libretro-dingux-mips32-make-default:
  extends: .libretro-dingux-mips32
  variables:
    platform: gcw0
    CC:       /opt/gcw0-toolchain/usr/bin/mipsel-linux-gcc
    CXX:      /opt/gcw0-toolchain/usr/bin/mipsel-linux-g++
    STRIP:    /opt/gcw0-toolchain/usr/bin/mipsel-gcw0-linux-uclibc-strip
  script:
    - make -C ${MAKEFILE_PATH} -f ${MAKEFILE} -j${NUMPROC}
  after_script:
    - if [ ! -f ${CORENAME}_libretro.so ]; then mv ${MAKEFILE_PATH}/${CORENAME}_libretro.so ${CORENAME}_libretro.so; fi
    - if [ $STRIP_CORE_LIB -eq 1 ]; then $STRIP --strip-unneeded ${CORENAME}_libretro.so; fi

.libretro-dingux-odbeta-mips32-make-default:
  image: $CI_SERVER_HOST:5050/libretro-infrastructure/libretro-build-dingux:odbeta
  extends: .libretro-dingux-mips32-make-default

.libretro-rs90-odbeta-mips32-make-default:
  image: $CI_SERVER_HOST:5050/libretro-infrastructure/libretro-build-dingux:odbeta
  extends: .libretro-dingux-mips32
  variables:
    platform: rs90
    CC:       /opt/rs90-toolchain/usr/bin/mipsel-linux-gcc
    CXX:      /opt/rs90-toolchain/usr/bin/mipsel-linux-g++
    STRIP:    /opt/rs90-toolchain/usr/bin/mipsel-linux-strip
  script:
    - make -C ${MAKEFILE_PATH} -f ${MAKEFILE} -j${NUMPROC}
  after_script:
    - if [ ! -f ${CORENAME}_libretro.so ]; then mv ${MAKEFILE_PATH}/${CORENAME}_libretro.so ${CORENAME}_libretro.so; fi
    - if [ $STRIP_CORE_LIB -eq 1 ]; then $STRIP --strip-unneeded ${CORENAME}_libretro.so; fi

.libretro-retrofw-mips32-make-default:
  image: $CI_SERVER_HOST:5050/libretro-infrastructure/libretro-build-dingux:odbeta
