.libretro-djgpp-static-cmake:
  image: $CI_SERVER_HOST:5050/libretro-infrastructure/libretro-djgpp-build-container:latest
  stage: build-static
  variables:
    BUILD_DIR: build/djgpp
    CMAKE_SOURCE_ROOT: .
  before_script:
    - export NUMPROC=$(($(nproc)/5))
  needs:
    - project: libretro/RetroArch
      job: ${STATIC_RETROARCH_JOB_NAME}
      ref: ${STATIC_RETROARCH_BRANCH}
      artifacts: true
  script:
    - cmake $CORE_ARGS "$CMAKE_SOURCE_ROOT" -B$BUILD_DIR -DCMAKE_BUILD_TYPE=Release -DLIBRETRO_STATIC=ON -DLIBRETRO_SUFFIX=_dos -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE_DIR/djgpp.cmake
    - cmake --build $BUILD_DIR --target ${CORENAME}_libretro --config Release -- -j $NUMPROC
    - mv $BUILD_DIR/$EXTRA_PATH/${CORENAME}_libretro_dos.a retroarch-precompiled/libretro_dos.a
    - cd retroarch-precompiled/
    - make -f Makefile.dos -j10
    - i586-pc-msdosdjgpp-strip retrodos.exe
    - mv retrodos.exe ../${CORENAME}_libretro_dos.exe
    - cd ../
  artifacts:
    paths:
    - ${CORENAME}_libretro_dos.exe
    expire_in: 10 min

.libretro-djgpp-static-cmake-retroarch-master:
  extends: .libretro-djgpp-static-cmake
  variables:
    STATIC_RETROARCH_BRANCH: master
    STATIC_RETROARCH_JOB_NAME: build-static-retroarch-djgpp
