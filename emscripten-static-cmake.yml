.libretro-emscripten-static-cmake:
  image: $CI_SERVER_HOST:5050/libretro-infrastructure/libretro-build-emscripten:latest
  stage: build-static
  variables:
    BUILD_DIR: build/emscripten
    CMAKE_SOURCE_ROOT: .
    EM_CACHE: "$CI_PROJECT_DIR/.cache/emscripten"
    EM_MEMORY: 134217728
    AR: emar
  before_script:
    - export NUMPROC=$(($(nproc)/5))
    - mkdir -p "$CI_PROJECT_DIR/.cache/emscripten"
  needs:
    - project: libretro/RetroArch
      job: ${STATIC_RETROARCH_JOB_NAME}
      ref: ${STATIC_RETROARCH_BRANCH}
      artifacts: true
  script:
    - emmake cmake $CORE_ARGS "$CMAKE_SOURCE_ROOT" -B$BUILD_DIR -DCMAKE_BUILD_TYPE=Release -DLIBRETRO_STATIC=ON -DLIBRETRO_SUFFIX=_emscripten -DCMAKE_TOOLCHAIN_FILE=/opt/emsdk/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake
    - emmake cmake --build $BUILD_DIR --target ${CORENAME}_libretro --config Release -- -j $NUMPROC
    - mv $BUILD_DIR/$EXTRA_PATH/${CORENAME}_libretro_emscripten.bc retroarch-precompiled/libretro_emscripten.bc
    - cd retroarch-precompiled/
    - emmake make -f Makefile.emscripten -j$NUMPROC LIBRETRO=${CORENAME} MEMORY=${EM_MEMORY}
    - mv ${CORENAME}_libretro.wasm ../
    - mv ${CORENAME}_libretro.js ../
    - cd ../
  artifacts:
    paths:
    - ${CORENAME}_libretro.wasm
    - ${CORENAME}_libretro.js
    expire_in: 10 min
  cache:
    key: "$CI_COMMIT_REF_SLUG-emscripten"
    paths:
      - "$CI_PROJECT_DIR/.cache/emscripten"

.libretro-emscripten-static-cmake-retroarch-master:
  extends: .libretro-emscripten-static-cmake
  variables:
    STATIC_RETROARCH_BRANCH: master
    STATIC_RETROARCH_JOB_NAME: build-static-retroarch-emscripten
