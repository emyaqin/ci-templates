.libretro-linux-x64:
  image: $CI_SERVER_HOST:5050/libretro-infrastructure/libretro-build-amd64-ubuntu:xenial-gcc9
  stage: build-shared
  variables:
    MAKEFILE: Makefile
    MAKEFILE_PATH: .
    STRIP_CORE_LIB: 1
  before_script:
    - export NUMPROC=$(($(nproc)/5))
  artifacts:
    paths:
    - ${CORENAME}_libretro.so
    expire_in: 10 min
  dependencies: []

.libretro-linux-x64-make-default:
  extends: .libretro-linux-x64
  variables:
    platform: unix
    CC:       gcc
    CXX:      g++
  script:
    - make -C ${MAKEFILE_PATH} -f ${MAKEFILE} -j${NUMPROC}
  after_script:
    - if [ ! -f ${CORENAME}_libretro.so ]; then mv ${MAKEFILE_PATH}/${CORENAME}_libretro.so ${CORENAME}_libretro.so; fi
    - if [ $STRIP_CORE_LIB -eq 1 ]; then strip --strip-unneeded ${CORENAME}_libretro.so; fi
