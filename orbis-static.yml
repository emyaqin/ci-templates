.libretro-orbis-static:
  image: $CI_SERVER_HOST:5050/libretro-infrastructure/libretro-build-orbis:latest
  stage: build-static
  variables:
    MAKEFILE: Makefile
    MAKEFILE_PATH: .
  before_script:
    - export NUMPROC=$(($(nproc)/5))
  needs:
    - project: libretro/RetroArch
      job: ${STATIC_RETROARCH_JOB_NAME}
      ref: ${STATIC_RETROARCH_BRANCH}
      artifacts: true
  script:
    - make -C ${MAKEFILE_PATH} -f ${MAKEFILE} -j$NUMPROC platform=orbis
    - mv ${MAKEFILE_PATH}/${CORENAME}_libretro_orbis.a retroarch-precompiled/libretro_orbis.a
    - cd retroarch-precompiled/
    - make -f Makefile.orbis -j$NUMPROC
    - mv retroarch_orbis.self ../${CORENAME}_libretro_orbis.self
    - cd ../
  artifacts:
    paths:
    - ${CORENAME}_libretro_orbis.self
    expire_in: 10 min

.libretro-orbis-static-retroarch-master:
  extends: .libretro-orbis-static
  variables:
    STATIC_RETROARCH_BRANCH: master
    STATIC_RETROARCH_JOB_NAME: build-static-retroarch-orbis
