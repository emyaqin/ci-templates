.libretro-osx-cmake:
  stage: build-shared
  tags:
   - macosx-packaging
  variables:
    LIBNAME: ${CORENAME}_libretro.dylib
    BUILD_DIR: build/osx-$ARCH
    CMAKE: cmake
    STRIP_CORE_LIB: 1
    CMAKE_SOURCE_ROOT: .
  before_script:
    - export NUMPROC=$(($(nproc)/5))
  script:
    - ${CMAKE} -DCMAKE_BUILD_TYPE=Release $CORE_ARGS "$CMAKE_SOURCE_ROOT" -B$BUILD_DIR $CMAKE_OSX_EXTRA
    - ${CMAKE} --build $BUILD_DIR --target ${CORENAME}_libretro --config Release -- -j $NUMPROC
    - mv $BUILD_DIR/$EXTRA_PATH/$LIBNAME $LIBNAME
    #- if [ $STRIP_CORE_LIB -eq 1 ]; then strip --strip-unneeded $LIBNAME; fi
  after_script:
    - rm -rf $BUILD_DIR
    - otool -l "${LIBNAME}" | grep -A3 'LC_VERSION_MIN_MACOSX' || true
    - otool -l "${LIBNAME}" | grep -A5 'platform macos' || true
    - otool -L "${LIBNAME}" || true
  artifacts:
    paths:
      - $LIBNAME
    expire_in: 10 min
  dependencies: []
