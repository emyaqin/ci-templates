.libretro-tvos-cmake-arm64:
  stage: build-shared
  tags:
   - mac-apple-silicon
  variables:
    ARCH: arm64
    LIBNAME: ${CORENAME}_libretro.dylib
    BUILD_DIR: build/ios-$ARCH
    CMAKE: cmake
    MINVER: "12.0"
    CMAKE_SOURCE_ROOT: .
    CMAKE_ADDL_COMP_FLAGS: -DIOS
    CMAKE_COMMON_ARGS: >
      -DCMAKE_BUILD_TYPE=RelWithDebInfo
      -DCMAKE_POSITION_INDEPENDENT_CODE=ON
      -DCMAKE_C_FLAGS="$CMAKE_ADDL_COMP_FLAGS"
      -DCMAKE_CXX_FLAGS="$CMAKE_ADDL_COMP_FLAGS"
      -DIOS=ON
      -DCMAKE_OSX_DEPLOYMENT_TARGET=$MINVER
      -DCMAKE_SYSTEM_NAME=tvOS
      -DCMAKE_SYSTEM_PROCESSOR=$ARCH
      -DCMAKE_OSX_ARCHITECTURES=$ARCH
  before_script:
    - set -x
    - export NUMPROC=$(($(nproc)/5))
  script:
    - ${CMAKE} $CMAKE_COMMON_ARGS $CORE_ARGS "$CMAKE_SOURCE_ROOT" -B$BUILD_DIR
    - ${CMAKE} --build $BUILD_DIR --target ${CORENAME}_libretro --config RelWithDebInfo --verbose -- -j $NUMPROC
    - mv $BUILD_DIR/$EXTRA_PATH/$LIBNAME $LIBNAME
    - dsymutil $LIBNAME -o ${LIBNAME}.dSYM
    - strip -S $LIBNAME
    - zip -r ${LIBNAME}.dSYM.zip ${LIBNAME}.dSYM
  after_script:
    - rm -rf $BUILD_DIR
    - otool -l "${LIBNAME}" | grep -A3 'LC_VERSION_MIN_IPHONEOS' || true
    - otool -L "${LIBNAME}" || true
    - vtool -show "${LIBNAME}" | true
  artifacts:
    paths:
      - $LIBNAME
      - ${LIBNAME}.dSYM.zip
    expire_in: 10 min
  dependencies: []
